name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.2"
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l main.go main_test.go)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
